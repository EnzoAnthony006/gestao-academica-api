<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão de Alunos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <form id="form-login">
        <h2>Login</h2>

        <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" required autocomplete="username" placeholder="Seu e-mail">
        </div>

        <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" required autocomplete="current-password" placeholder="Sua senha">
        </div>

        <button type="button" onclick="fazerLogin()">Entrar</button>
        <p id="mensagem-erro"></p>
    </form>
</div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
